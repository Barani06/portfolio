// ─── CANVAS HERO BACKGROUND ──────────────────────────────────────────────────
function HeroCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let animId;
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const particles = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.5 + 0.1
    }));
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,212,255,${p.alpha})`;
        ctx.fill();
      });
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist < 120) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(0,212,255,${0.12 * (1 - dist/120)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={canvasRef} id="hero-canvas" />;
}

            </div>
          </div>
          {/* Form */}
          <div className="card" style={{padding:36}}>
            <div style={{fontFamily:'Fira Code', fontSize:12, color:'#64748b', marginBottom:24}}>POST /api/contact</div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16}}>
              <div>
                <label style={{display:'block', fontSize:13, color:'#94a3b8', marginBottom:6}}>Name *</label>
                <input value={form.name} onChange={e=>setForm({...form, name:e.target.value})} placeholder="Your name" />
              </div>
              <div>
                <label style={{display:'block', fontSize:13, color:'#94a3b8', marginBottom:6}}>Email *</label>
                <input type="email" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} placeholder="you@company.com" />
              </div>
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, marginBottom:16}}>
              <div>
                <label style={{display:'block', fontSize:13, color:'#94a3b8', marginBottom:6}}>Company</label>
                <input value={form.company} onChange={e=>setForm({...form, company:e.target.value})} placeholder="Your company" />
              </div>
              <div>
                <label style={{display:'block', fontSize:13, color:'#94a3b8', marginBottom:6}}>Job Role</label>
                <input value={form.role} onChange={e=>setForm({...form, role:e.target.value})} placeholder="e.g. Data Engineer" />
              </div>
            </div>
            <div style={{marginBottom:24}}>
              <label style={{display:'block', fontSize:13, color:'#94a3b8', marginBottom:6}}>Message *</label>
              <textarea value={form.message} onChange={e=>setForm({...form, message:e.target.value})} placeholder="Tell me about the opportunity or project..." />
            </div>
            <button className="btn-primary" onClick={handleSubmit} disabled={loading} style={{width:'100%', justifyContent:'center', opacity: loading ? 0.7 : 1}}>
              {loading ? (
                <><div className="rotating-ring" style={{width:16, height:16}} /> Sending...</>
              ) : '🚀 Send Message'}
            </button>
          </div>
        </div>
      </div>
    </section>
  );
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ toast, setToast }) {
  useEffect(() => {
    if (!toast) return;
    const t = setTimeout(() => setToast(null), 4000);
    return () => clearTimeout(t);
  }, [toast]);
  if (!toast) return null;
  return (
    <div className="toast">
      <span>{toast.msg}</span>
    </div>
  );
}

function App() {

    link.download = 'Barani_S_Resume.pdf';
    link.target = '_blank';
    link.click();
    setToast({ msg: '⬇ Resume download started!', type: 'success' });
  };

  // Track page visit
  useEffect(() => {
    fetch(`${API_BASE}/api/track`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ page: '/', device: navigator.userAgent.includes('Mobile') ? 'mobile' : 'desktop' })
    }).catch(() => {});
  }, []);

  return (
    <>
