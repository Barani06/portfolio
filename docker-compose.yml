version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_pass
      POSTGRES_DB: portfolio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d portfolio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: portfolio_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://portfolio_user:portfolio_pass@db:5432/portfolio_db
      GITHUB_USERNAME: Barani06
      GITHUB_TOKEN: ${GITHUB_TOKEN:-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}
      EMAIL_FROM: ${EMAIL_FROM:-sbarani275@gmail.com}
      EMAIL_TO: ${EMAIL_TO:-sbarani275@gmail.com}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-sbarani275@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-qewh pzam ugec svbr}
      RESUME_PATH: /app/static/Barani_S_Resume.pdf
    volumes:
      - ./backend:/app
      - resume_storage:/app/static
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx Frontend ──────────────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: portfolio_frontend
    restart: unless-stopped
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./profile.jpg:/usr/share/nginx/html/profile.jpg:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend

volumes:
  postgres_data:
  resume_storage:
